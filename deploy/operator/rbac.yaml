apiVersion: v1
kind: ServiceAccount
metadata:
  name: relaymail-operator
  namespace: relaymail-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: relaymail-operator
rules:
  # Watch and manage RelayMailSes CRDs.
  - apiGroups: [relaymail.io]
    resources: [relaymailseses]
    verbs: [get, list, watch, patch, update]
  - apiGroups: [relaymail.io]
    resources: [relaymailseses/status]
    verbs: [get, patch, update]
  - apiGroups: [relaymail.io]
    resources: [relaymailseses/finalizers]
    verbs: [update]
  # Manage owned resources.
  - apiGroups: [""]
    resources: [serviceaccounts, configmaps, services]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch, create, update, patch, delete]
  # Events.
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: relaymail-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: relaymail-operator
subjects:
  - kind: ServiceAccount
    name: relaymail-operator
    namespace: relaymail-system
