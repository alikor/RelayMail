apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: relaymail
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml
# secret.template.yaml is intentionally omitted from resources — populate
# secrets via an out-of-band Secret resource (SealedSecrets, ExternalSecrets,
# etc.) in environment-specific overlays.
