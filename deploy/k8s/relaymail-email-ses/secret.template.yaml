# Template for secrets. NEVER commit a populated version of this file.
# Prefer IRSA + SSM/Secrets Manager over Kubernetes Secrets where possible.
apiVersion: v1
kind: Secret
metadata:
  name: relaymail-email-ses-secrets
  namespace: relaymail
type: Opaque
stringData:
  # Provider API credentials. Leave disabled providers blank.
  RESEND_API_KEY: ""
  POSTMARK_SERVER_TOKEN: ""
  SMTP2GO_API_KEY: ""

  # Provider webhook authentication.
  RESEND_WEBHOOK_SECRET: ""
  POSTMARK_WEBHOOK_USERNAME: ""
  POSTMARK_WEBHOOK_PASSWORD: ""
  SMTP2GO_WEBHOOK_AUTH_TOKEN: ""

  # When AWS_REGION + IRSA are enough, leave these blank and delete this file.
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
