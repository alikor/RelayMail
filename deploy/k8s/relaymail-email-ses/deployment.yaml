apiVersion: apps/v1
kind: Deployment
metadata:
  name: relaymail-email-ses
  namespace: relaymail
  labels:
    app.kubernetes.io/name: relaymail-email-ses
    app.kubernetes.io/part-of: relaymail
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: relaymail-email-ses
  template:
    metadata:
      labels:
        app.kubernetes.io/name: relaymail-email-ses
    spec:
      serviceAccountName: relaymail-email-ses
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/alikor/relaymail-email-ses:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: relaymail-email-ses-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
